name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'proto/**'
      - '.golangci.yml'
      - '.github/workflows/golangci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - run: make proto-gen

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4