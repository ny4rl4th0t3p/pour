name: Test

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'proto/**'
      - 'Dockerfile'
      - 'tests/smoke/**'
      - 'Makefile'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - run: make proto-gen

      - run: make build

      - run: make test

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - run: make proto-gen

      - uses: docker/setup-buildx-action@v3

      - run: make test-smoke