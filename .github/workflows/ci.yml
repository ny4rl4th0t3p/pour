name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'proto/**'
      - 'Makefile'
      - '.golangci.yml'
      - 'Dockerfile'
      - 'tests/smoke/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install proto tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.69.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

      - run: make proto-gen
      - run: make build
      - run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install proto tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.69.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

      - run: make proto-gen

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install proto tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.69.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

      - run: make proto-gen

      - uses: docker/setup-buildx-action@v3

      - run: make test-smoke