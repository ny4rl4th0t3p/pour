<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour — Cosmos Faucet</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .12);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: .875rem;
            font-weight: 500;
            margin-bottom: .375rem;
        }

        select, input {
            display: block;
            width: 100%;
            padding: .5rem .75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: .875rem;
            margin-bottom: 1rem;
            background: #fff;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .2);
        }

        button {
            width: 100%;
            padding: .625rem 1rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
        }

        button:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }

        button:not(:disabled):hover {
            background: #4f46e5;
        }

        .result {
            margin-top: 1rem;
            padding: .75rem;
            border-radius: 6px;
            font-size: .8125rem;
            word-break: break-all;
            display: none;
        }

        .result.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .result.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Pour — Cosmos Faucet</h1>

    <label for="chain">Chain</label>
    <select id="chain" disabled>
        <option value="">Loading chains…</option>
    </select>

    <label for="address">Address</label>
    <input id="address" type="text" placeholder="osmo1…" autocomplete="off" spellcheck="false">

    <button id="submit" type="button" disabled>Request tokens</button>

    <div id="result" class="result"></div>
</div>

<script>
    const chainSel = document.getElementById('chain');
    const addrInput = document.getElementById('address');
    const submitBtn = document.getElementById('submit');
    const resultEl = document.getElementById('result');

    function showResult(msg, ok) {
        resultEl.textContent = msg;
        resultEl.className = 'result ' + (ok ? 'success' : 'error');
        resultEl.style.display = 'block';
    }

    async function init() {
        try {
            const [infoRes, chainsRes] = await Promise.all([
                fetch('/v1/info'),
                fetch('/v1/chains'),
            ]);
            const chains = await chainsRes.json();

            chainSel.innerHTML = '';
            if (!chains.chains || chains.chains.length === 0) {
                chainSel.innerHTML = '<option value="">No chains available</option>';
                return;
            }
            chains.chains.forEach(function (c) {
                const opt = document.createElement('option');
                opt.value = c.chain_id;
                opt.textContent = c.chain_id + ' (' + c.drip_amount + ')';
                chainSel.appendChild(opt);
            });
            chainSel.disabled = false;
            submitBtn.disabled = false;

            // v0.4.0: if (await infoRes.json()).abuse.pow_enabled → init Altcha widget
            void infoRes;
        } catch (err) {
            showResult('Failed to load chain list: ' + err.message, false);
        }
    }

    submitBtn.addEventListener('click', async function () {
        const chainID = chainSel.value;
        const address = addrInput.value.trim();

        if (!address) {
            showResult('Please enter an address.', false);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending…';
        resultEl.style.display = 'none';

        try {
            const res = await fetch('/v1/pour', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chain_id: chainID, address: address}),
            });
            const data = await res.json();
            if (res.ok) {
                showResult('Sent ' + data.amount + '  •  tx: ' + data.tx_hash, true);
            } else {
                showResult(data.error || 'Unknown error', false);
            }
        } catch (err) {
            showResult('Request failed: ' + err.message, false);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Request tokens';
        }
    });

    init();
</script>
</body>
</html>
