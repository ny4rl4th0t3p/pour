<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour — Cosmos Faucet</title>
    <script async defer src="https://cdn.jsdelivr.net/gh/altcha-org/altcha/dist/altcha.min.js" type="module"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .12);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: .875rem;
            font-weight: 500;
            margin-bottom: .375rem;
        }

        select, input {
            display: block;
            width: 100%;
            padding: .5rem .75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: .875rem;
            margin-bottom: 1rem;
            background: #fff;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .2);
        }

        button {
            width: 100%;
            padding: .625rem 1rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
        }

        button:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }

        button:not(:disabled):hover {
            background: #4f46e5;
        }

        .keplr-btn {
            background: #e5e7eb;
            color: #6b7280;
            margin-bottom: .75rem;
        }

        .keplr-btn:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .altcha-wrap {
            margin-bottom: .75rem;
        }

        .result {
            margin-top: 1rem;
            padding: .75rem;
            border-radius: 6px;
            font-size: .8125rem;
            word-break: break-all;
            display: none;
        }

        .result.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .result.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Pour — Cosmos Faucet</h1>

    <label for="chain">Chain</label>
    <select id="chain" disabled>
        <option value="">Loading chains…</option>
    </select>

    <label for="address">Address</label>
    <input id="address" type="text" placeholder="osmo1…" autocomplete="off" spellcheck="false">

    <div id="abuse-widgets"></div>

    <button id="submit" type="button" disabled>Request tokens</button>

    <div id="result" class="result"></div>
</div>

<script>
    const chainSel = document.getElementById('chain');
    const addrInput = document.getElementById('address');
    const submitBtn = document.getElementById('submit');
    const resultEl = document.getElementById('result');
    const abuseEl = document.getElementById('abuse-widgets');

    let powEnabled = false;
    let sigEnabled = false;
    let challengeJSON = null;
    let altchaWidget = null;
    let altchaVerified = false;

    function showResult(msg, ok) {
        resultEl.textContent = msg;
        resultEl.className = 'result ' + (ok ? 'success' : 'error');
        resultEl.style.display = 'block';
    }

    async function fetchChallenge() {
        try {
            const res = await fetch('/v1/pow/challenge');
            if (!res.ok) return;
            const data = await res.json();
            challengeJSON = data.challenge;
            if (altchaWidget && challengeJSON) {
                altchaVerified = false;
                altchaWidget.challenge = JSON.parse(challengeJSON);
            }
        } catch (_) { /* non-fatal; submit will be blocked by altchaVerified */ }
    }

    async function init() {
        try {
            const [infoRes, chainsRes] = await Promise.all([
                fetch('/v1/info'),
                fetch('/v1/chains'),
            ]);
            const info = await infoRes.json();
            const chains = await chainsRes.json();

            powEnabled = !!(info.abuse && info.abuse.pow_enabled);
            sigEnabled = !!(info.abuse && info.abuse.signature_challenge_enabled);

            chainSel.innerHTML = '';
            if (!chains.chains || chains.chains.length === 0) {
                chainSel.innerHTML = '<option value="">No chains available</option>';
                return;
            }
            chains.chains.forEach(function (c) {
                const opt = document.createElement('option');
                opt.value = c.chain_id;
                opt.textContent = c.chain_id + ' (' + c.drip_amount + ')';
                chainSel.appendChild(opt);
            });
            chainSel.disabled = false;

            if (sigEnabled) {
                const keplrBtn = document.createElement('button');
                keplrBtn.type = 'button';
                keplrBtn.className = 'keplr-btn';
                keplrBtn.disabled = true;
                keplrBtn.textContent = 'Sign with Keplr (coming soon)';
                abuseEl.appendChild(keplrBtn);
            }

            if (powEnabled) {
                const wrap = document.createElement('div');
                wrap.className = 'altcha-wrap';
                altchaWidget = document.createElement('altcha-widget');
                altchaWidget.setAttribute('auto', 'onload');
                altchaWidget.setAttribute('hidelogo', '');
                wrap.appendChild(altchaWidget);
                abuseEl.appendChild(wrap);

                altchaWidget.addEventListener('statechange', function (ev) {
                    altchaVerified = ev.detail && ev.detail.state === 'verified';
                    submitBtn.disabled = !altchaVerified;
                });

                await fetchChallenge();
                // submit stays disabled until statechange fires with verified
            } else {
                submitBtn.disabled = false;
            }
        } catch (err) {
            showResult('Failed to load chain list: ' + err.message, false);
        }
    }

    submitBtn.addEventListener('click', async function () {
        const chainID = chainSel.value;
        const address = addrInput.value.trim();

        if (!address) {
            showResult('Please enter an address.', false);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending…';
        resultEl.style.display = 'none';

        try {
            const body = {chain_id: chainID, address: address};
            if (powEnabled && altchaWidget) {
                body.pow = {challenge: challengeJSON, solution: altchaWidget.value};
            }

            const res = await fetch('/v1/pour', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (res.ok) {
                showResult('Sent ' + data.amount + '  •  tx: ' + (data.tx_hash || 'queued'), true);
                if (powEnabled) {
                    altchaVerified = false;
                    submitBtn.disabled = true;
                    await fetchChallenge();
                }
            } else {
                showResult(data.error || 'Unknown error', false);
                if (powEnabled) submitBtn.disabled = !altchaVerified;
            }
        } catch (err) {
            showResult('Request failed: ' + err.message, false);
            if (powEnabled) submitBtn.disabled = !altchaVerified;
        } finally {
            if (!powEnabled) {
                submitBtn.disabled = false;
            }
            submitBtn.textContent = 'Request tokens';
        }
    });

    init();
</script>
</body>
</html>
